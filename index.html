<!DOCTYPE html>
<!-- Эта строка говорит браузеру, что документ написан по современным правилам HTML5 -->
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- charset UTF-8 нужен, чтобы кириллица (русские буквы) отображалась правильно, а не как "кракозябры" -->
    <title>Мой первый сайт</title>
    <!-- Текст в title показывается на вкладке браузера -->
</head>
<body>
    <h1>Привет, мир!</h1>
    <!-- h1 — самый крупный заголовок на странице -->
    <p>Это моя первая веб-страница, опубликованная через GitHub Pages.</p>
    <!-- p — обычный абзац текста -->
</body>
</html>
